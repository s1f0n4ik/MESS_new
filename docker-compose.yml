services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: postcards-backend
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8787 --reload
    volumes:
      - ./backend:/app
    ports:
      - "8787:8787"
    environment:
      PYTHONUNBUFFERED: "1"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: postcards-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: "http://backend:8787"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      - backend

volumes:
  frontend_node_modules: