<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <title>PDF</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; background: #111; }
    #empty { display: grid; place-items: center; height: 100%; color: #ccc; font-family: sans-serif; }
    #frame { width: 100%; height: 100%; border: 0; display: none; }
  </style>
</head>
<body>
  <div id="empty">Ожидание PDF…</div>
  <iframe id="frame" title="PDF"></iframe>

  <script>
    const role = new URLSearchParams(location.search).get('role') || 'pc1'
    const empty = document.getElementById('empty')
    const frame = document.getElementById('frame')
    let currentSrc = ''

    async function tick() {
      try {
        const r = await fetch('/api/state', { cache: 'no-store' })
        const s = await r.json()
        const w = s?.pdfWindow || {}
        const shouldShow = w.visible && w.role === role && !!w.pdfFile

        if (!shouldShow) {
          frame.style.display = 'none'
          empty.style.display = 'grid'
          return
        }

        const src = `/pdfs/${encodeURIComponent(w.pdfFile)}#toolbar=0&navpanes=0`
        if (src !== currentSrc) {
          frame.src = src
          currentSrc = src
        }
        frame.style.display = 'block'
        empty.style.display = 'none'
      } catch {
        // ignore
      }
    }

    tick()
    setInterval(tick, 500)
  </script>
</body>
</html>
