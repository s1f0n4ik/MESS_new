<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title> </title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      overflow: auto;
    }
    #pdf {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
    }
  </style>
</head>
<body>
  <iframe id="pdf"></iframe>

  <script>
    const qs = new URLSearchParams(location.search)
    const role = qs.get('role') || 'pc1'
    const iframe = document.getElementById('pdf')

    function setPdf(file) {
      if (!file) return
      iframe.src = `/pdfs/${encodeURIComponent(file)}#toolbar=0&navpanes=0&scrollbar=1`
    }

    async function loadInitial() {
      const r = await fetch('/api/state')
      const s = await r.json()
      setPdf(s?.pdfsByRole?.[role] || `${role}.pdf`)
    }

    loadInitial().catch(console.error)
  </script>
</body>
</html>
